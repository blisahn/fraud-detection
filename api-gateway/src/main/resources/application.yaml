spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: transaction-service
              uri: lb://transaction-service
              predicates:
                - Path=/api/v1/transactions/**

            # Route 2: Fraud Analysis Service
            - id: fraud-analysis-service
              uri: lb://fraud-analysis-service
              predicates:
                - Path=/api/v1/fraud/**

            # Route 3: Notification Service
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**
            # Route 4: AI Insight Service
            - id: ai-insight-service
              uri: lb://ai-insight-service
              predicates:
                - Path=/api/v1/insights/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    enabled-by-default: true
    web:
      exposure:
        include: health,info,mappings
server:
  port: 8060

